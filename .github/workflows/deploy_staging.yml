name: Deploy to Staging

on:
  push:
    branches: ["develop"]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    outputs:
      version: ${{ steps.version.outputs.VERSION }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Docker Login
        uses: docker/login-action@v3
        with:
          username: "slemfowel1"
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Get Version Tag
        id: version
        run: echo "VERSION=$(git describe --tags --always)-staging" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build and Push Docker Image for Staging
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            slemfowel1/nextbridge-limited:staging-latest
            slemfowel1/nextbridge-limited:${{ steps.version.outputs.VERSION }}

      - name: Wait for Docker Hub propagation
        run: sleep 10

      - name: Verify Docker Image Push
        run: |
          echo "Verifying image was pushed..."
          if docker pull slemfowel1/nextbridge-limited:staging-latest > /dev/null 2>&1; then
            echo "✅ Docker image successfully pushed and verified."
          else
            echo "❌ Failed to pull docker image"
            exit 1
          fi

      - name: Notify Build Success
        if: success()
        run: echo "✅ Docker image built and pushed successfully for version ${{ steps.version.outputs.VERSION }}"

      - name: Notify Build Failure
        if: failure()
        run: echo "❌ Docker image build failed"

  deploy:
    needs: build-and-push
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Pull Docker Image
        run: docker pull slemfowel1/nextbridge-limited:staging-latest

      - name: Stop and Remove Old Container
        run: |
          docker stop nextBridge-staging || true
          docker rm nextBridge-staging || true

      - name: Run Docker Container
        run: |
          docker run -d \
            -p 5061:5061 \
            --name nextBridge-staging \
            --restart unless-stopped \
            --env-file .env \
            slemfowel1/nextbridge-limited:staging-latest

      - name: Health Check
        run: |
          echo "Waiting for application to be ready..."
          for i in {1..40}; do
            if curl -f http://localhost:5061 > /dev/null 2>&1; then
              echo "✅ Application is healthy and ready"
              exit 0
            fi
            echo "Attempt $i/40: Application not ready yet, waiting..."
            sleep 2
          done
          echo "❌ Application failed to become healthy within timeout"
          exit 1

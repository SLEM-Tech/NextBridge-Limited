<svg width="560" height="120" viewBox="0 0 560 120" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="NextBridge Limited">
  <!-- Nexus mark: a solid point linked to its network -->
  <g transform="translate(8 12)">
    <rect x="2" y="2" width="92" height="92" rx="24" fill="#1F5EFF"/>
    <g stroke="#FFFFFF" stroke-width="5" stroke-linecap="round">
      <line x1="48" y1="48" x2="24" y2="24"/>
      <line x1="48" y1="48" x2="72" y2="24"/>
      <line x1="48" y1="48" x2="24" y2="72"/>
      <line x1="48" y1="48" x2="72" y2="72"/>
    </g>
    <circle cx="48" cy="48" r="13" fill="#FFFFFF"/>
    <circle cx="24" cy="24" r="7" fill="#FFFFFF"/>
    <circle cx="72" cy="24" r="7" fill="#FFFFFF"/>
    <circle cx="24" cy="72" r="7" fill="#FFFFFF"/>
    <circle cx="72" cy="72" r="7" fill="#FFFFFF"/>
  </g>
  <!-- Wordmark -->
  <text x="120" y="54" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="800" letter-spacing="-1" fill="#0B0B0C">SOLIDPOINT <tspan fill="#1F5EFF">NEXUS</tspan></text>
  <text x="121" y="84" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="600" letter-spacing="6" fill="#5B5B5B">INNOVATIONS LTD</text>
</svg>
